<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - 행정사사무소 위민</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Malgun Gothic','맑은 고딕',sans-serif;
            background: linear-gradient(135deg, #070f1a 0%, #0D2B4E 60%, #1B4F8A 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .login-wrap { width: 100%; max-width: 420px; padding: 20px; }

        .login-card {
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
            backdrop-filter: blur(10px);
        }

        .logo-area { text-align: center; margin-bottom: 36px; }
        .logo-sub  { font-size: 12px; color: #8899aa; letter-spacing: 2px; }
        .logo-main { font-size: 32px; font-weight: 900; color: #fff; letter-spacing: 4px; margin: 6px 0 4px; }
        .logo-badge {
            display: inline-block; background: rgba(255,213,79,.15);
            border: 1px solid rgba(255,213,79,.3);
            color: #FFD54F; font-size: 12px; padding: 4px 14px; border-radius: 50px;
            letter-spacing: 1px;
        }

        .section-title {
            font-size: 16px; font-weight: 700; color: rgba(255,255,255,.6);
            text-align: center; margin-bottom: 28px; letter-spacing: 1px;
        }

        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 12px; color: #8899aa; margin-bottom: 8px; letter-spacing: 1px; }
        .field input {
            width: 100%; padding: 14px 18px;
            background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
            border-radius: 10px; color: #fff; font-size: 15px; font-family: inherit;
            outline: none; transition: border-color .2s, background .2s;
        }
        .field input:focus {
            border-color: rgba(255,213,79,.5); background: rgba(255,255,255,.12);
        }
        .field input::placeholder { color: rgba(255,255,255,.3); }

        .btn-login {
            width: 100%; padding: 15px; margin-top: 8px;
            background: linear-gradient(135deg, #E65100, #FB8C00);
            color: #fff; font-size: 16px; font-weight: 800; font-family: inherit;
            border: none; border-radius: 10px; cursor: pointer;
            transition: opacity .2s, transform .1s;
            letter-spacing: 1px;
        }
        .btn-login:hover   { opacity: .9; }
        .btn-login:active  { transform: scale(.98); }

        .error-msg {
            display: none; text-align: center; margin-top: 14px;
            color: #ff8888; font-size: 14px;
            background: rgba(255,100,100,.1); border: 1px solid rgba(255,100,100,.2);
            border-radius: 8px; padding: 10px;
        }
        .error-msg.show { display: block; }

        .hint {
            text-align: center; margin-top: 24px;
            font-size: 12px; color: rgba(255,255,255,.3);
            border-top: 1px solid rgba(255,255,255,.08); padding-top: 18px;
        }
        .hint strong { color: rgba(255,255,255,.5); }

        .back-link {
            display: block; text-align: center; margin-top: 16px;
            font-size: 13px; color: rgba(255,255,255,.35); text-decoration: none;
            transition: color .2s;
        }
        .back-link:hover { color: rgba(255,255,255,.7); }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="login-card">

        <div class="logo-area">
            <div class="logo-sub">행정사사무소</div>
            <div class="logo-main">위민</div>
            <div class="logo-badge">관리자 로그인</div>
        </div>

        <div class="section-title">비밀번호를 입력하세요</div>

        <div class="field">
            <label>비밀번호</label>
            <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>

        <button class="btn-login" onclick="doLogin()">로그인</button>

        <div class="error-msg" id="errMsg">
            비밀번호가 올바르지 않습니다. 다시 시도해 주세요.
        </div>

        <div class="hint">
            초기 비밀번호: <strong>weimin2024</strong><br>
            (관리 패널 → 보안 설정에서 변경 가능)
        </div>

        <a href="../index.html" class="back-link">← 사이트로 돌아가기</a>

    </div>
</div>

<script src="../js/main.js"></script>
<script>
    // 이미 로그인된 경우 패널로 이동
    (function () {
        const params = new URLSearchParams(location.search);
        if (params.get('from') === 'logout') {
            WeiminCMS.logout();
        } else if (WeiminCMS.isAdmin()) {
            location.href = 'panel.html';
        }
    })();

    function doLogin() {
        const pw = document.getElementById('pw').value;
        const err = document.getElementById('errMsg');
        if (!pw) { err.classList.add('show'); err.textContent = '비밀번호를 입력해 주세요.'; return; }
        if (WeiminCMS.login(pw)) {
            location.href = 'panel.html';
        } else {
            err.classList.add('show');
            err.textContent = '비밀번호가 올바르지 않습니다. 다시 시도해 주세요.';
            document.getElementById('pw').value = '';
            document.getElementById('pw').focus();
        }
    }
</script>
</body>
</html>
