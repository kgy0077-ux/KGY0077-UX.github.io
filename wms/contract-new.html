<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수임계약 등록 — 위민 수임관리시스템</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-w: 220px; --topbar-h: 58px;
      --primary: #1B4F8A; --accent: #E65100;
      --bg: #F0F4F8; --border: #DDE3EC;
      --text: #1a2230; --sub: #5a6a7e;
      --card: #ffffff; --sh: 0 2px 12px rgba(0,0,0,.07);
    }
    body { font-family: 'Malgun Gothic','맑은 고딕',sans-serif; background: var(--bg); color: var(--text); }

    /* TOPBAR */
    .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: var(--topbar-h); background: #070f1a; display: flex; align-items: center; padding: 0 24px; box-shadow: 0 2px 12px rgba(0,0,0,.4); }
    .tb-brand { display: flex; align-items: center; gap: 10px; margin-right: auto; }
    .tb-brand-logo { height: 36px; width: auto; object-fit: contain; filter: brightness(1.1); }
    .tb-brand-text { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: 2px; white-space: nowrap; }
    .tb-brand-sub  { display: none; }
    .tb-brand-main { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: 2px; }
    .tb-badge { background: rgba(230,81,0,.2); color: #FF8A50; border: 1px solid rgba(230,81,0,.3); font-size: 11px; padding: 3px 12px; border-radius: 50px; margin-left: 12px; letter-spacing: 1px; }
    .tb-actions { display: flex; gap: 10px; }
    .tb-btn { padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-family: inherit; transition: all .2s; }
    .tb-ghost  { background: rgba(255,255,255,.1); color: #ccd; }
    .tb-ghost:hover { background: rgba(255,255,255,.2); color: #fff; }
    .tb-out { background: rgba(200,60,60,.2); color: #f99; }
    .tb-out:hover { background: rgba(200,60,60,.35); }

    /* LAYOUT */
    .layout { display: flex; margin-top: var(--topbar-h); min-height: calc(100vh - var(--topbar-h)); }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar-w); flex-shrink: 0; background: #0D2B4E; position: fixed; top: var(--topbar-h); bottom: 0; left: 0; overflow-y: auto; display: flex; flex-direction: column; }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }
    .nav-section { font-size: 10px; color: rgba(255,255,255,.25); letter-spacing: 2px; padding: 20px 18px 6px; text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 13px 18px; font-size: 14px; color: #8899aa; transition: all .18s; border-left: 3px solid transparent; text-decoration: none; }
    .nav-item:hover { background: rgba(255,255,255,.05); color: #ccd; }
    .nav-item.active { background: rgba(255,255,255,.09); color: #fff; border-left-color: var(--accent); }
    .nav-item .icon { font-size: 18px; flex-shrink: 0; }
    .nav-item .label { font-weight: 600; }
    .sidebar-bottom { margin-top: auto; padding: 16px; }
    .btn-pw { width: 100%; padding: 10px; background: rgba(255,255,255,.06); color: #8899aa; border: 1px solid rgba(255,255,255,.1); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s; }
    .btn-pw:hover { background: rgba(255,255,255,.12); color: #ccd; }

    /* MAIN */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 32px; }
    .page-wrap { max-width: 780px; }
    .page-hd { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .page-hd-icon { font-size: 38px; }
    .page-hd h2 { font-size: 22px; font-weight: 900; color: var(--primary); }
    .page-hd p  { font-size: 13px; color: var(--sub); margin-top: 3px; }

    /* DRIVE BANNER */
    .drive-banner { display: flex; align-items: center; justify-content: space-between; padding: 11px 20px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; }
    .drive-banner.on  { background: #E8F5E9; border: 1px solid #A5D6A7; color: #1B5E20; }
    .drive-banner.off { background: #FFF8E1; border: 1px solid #FFD54F; color: #E65100; }
    .btn-link { padding: 6px 16px; border-radius: 7px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; transition: all .2s; }
    .btn-link.do   { background: var(--accent); color: #fff; }
    .btn-link.done { background: #2E7D32; color: #fff; cursor: default; }

    /* CARD */
    .card { background: var(--card); border-radius: 14px; box-shadow: var(--sh); padding: 28px; margin-bottom: 20px; border: 1px solid var(--border); }
    .card-title { font-size: 14px; font-weight: 800; color: var(--primary); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #EEF4FF; }

    /* FORM */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .grid2 .full { grid-column: 1 / -1; }
    @media (max-width: 600px) { .grid2 { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--text); }
    .field-hint { font-size: 11px; color: var(--sub); }
    .field input, .field select, .field textarea {
      padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 14px; font-family: inherit; color: var(--text); background: #FAFCFF;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--primary); box-shadow: 0 0 0 3px rgba(27,79,138,.1);
    }
    .field textarea { resize: vertical; min-height: 100px; line-height: 1.7; }
    .req { color: #E65100; }

    /* STATUS */
    .status-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .sopt input { display: none; }
    .sopt label { display: inline-block; padding: 8px 20px; border-radius: 50px; cursor: pointer; font-size: 13px; font-weight: 700; border: 2px solid var(--border); color: var(--sub); transition: all .18s; }
    .sopt.blue   input:checked + label { border-color: #1B4F8A; color: #1B4F8A; background: #EEF4FF; }
    .sopt.green  input:checked + label { border-color: #2E7D32; color: #2E7D32; background: #E8F5E9; }
    .sopt.orange input:checked + label { border-color: #E65100; color: #E65100; background: #FFF3E0; }
    .sopt.gray   input:checked + label { border-color: #546E7A; color: #546E7A; background: #ECEFF1; }

    /* ACTIONS */
    .act-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }
    .btn-cancel { padding: 12px 28px; border-radius: 9px; font-size: 14px; font-weight: 700; font-family: inherit; border: 1.5px solid var(--border); background: white; color: var(--sub); cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; transition: all .2s; }
    .btn-cancel:hover { background: var(--bg); }
    .btn-submit { padding: 12px 32px; border-radius: 9px; font-size: 14px; font-weight: 800; font-family: inherit; border: none; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all .2s; }
    .btn-submit:hover { background: #BF360C; transform: translateY(-1px); }

    /* TOAST */
    #toast { position: fixed; bottom: 28px; right: 28px; z-index: 99999; padding: 13px 22px; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: inherit; box-shadow: 0 6px 24px rgba(0,0,0,.18); transform: translateY(80px); opacity: 0; transition: all .3s cubic-bezier(.34,1.56,.64,1); pointer-events: none; }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { background: #1B5E20; color: #fff; }
    #toast.error   { background: #B71C1C; color: #fff; }
    #toast.info    { background: var(--primary); color: #fff; }

    /* PW MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 9000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: white; border-radius: 16px; padding: 32px; max-width: 380px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .modal-title { font-size: 17px; font-weight: 800; margin-bottom: 20px; color: var(--primary); }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 6px; }
    .modal-field input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 14px; font-family: inherit; outline: none; }
    .modal-field input:focus { border-color: var(--primary); }
    .modal-msg { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 7px; display: none; }
    .modal-msg.show { display: block; }
    .modal-msg.ok  { background: #E8F5E9; color: #1B5E20; }
    .modal-msg.err { background: #FFEBEE; color: #C62828; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-mcancel { padding: 9px 20px; border-radius: 8px; border: 1.5px solid var(--border); background: white; color: var(--sub); font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-msave   { padding: 9px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
<header class="topbar">
  <div class="tb-brand">
    <img src="행정사마크.png" class="tb-brand-logo" alt="행정사마크">
    <span class="tb-brand-text">행정사사무소 위민</span>
  </div>
  <span class="tb-badge" id="pageMode">수임계약 등록</span>
  <div class="tb-actions" style="margin-left:auto;">
    <button class="tb-btn tb-out" onclick="WeiminContracts.logout();location.href='index.html'">로그아웃</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-section">수임 관리</div>
    <a class="nav-item active" href="contract-new.html"><span class="icon">✏️</span><span class="label">계약 등록</span></a>
    <a class="nav-item" href="contracts.html"><span class="icon">📂</span><span class="label">계약 목록</span></a>
    <a class="nav-item" href="calendar.html"><span class="icon">📅</span><span class="label">업무 캘린더</span></a>
    <div class="sidebar-bottom">
      <button class="btn-pw" onclick="openPwModal()">🔐 비밀번호 변경</button>
    </div>
  </aside>

  <div class="main">
    <div class="page-wrap">
      <div class="page-hd">
        <div class="page-hd-icon" id="pageIcon">✏️</div>
        <div>
          <h2 id="pageTitle">수임계약 등록</h2>
          <p id="pageDesc">새 수임계약을 등록하면 업무 캘린더에 자동 반영됩니다</p>
        </div>
      </div>

      <div class="drive-banner off" id="driveBanner">
        <span id="driveMsg">💾 D드라이브 폴더가 연결되지 않았습니다</span>
        <button class="btn-link do" id="btnConnect" onclick="connectDrive()">📁 폴더 연결</button>
      </div>

      <!-- 의뢰인 -->
      <div class="card">
        <div class="card-title">👤 의뢰인 정보</div>
        <div class="grid2">
          <div class="field">
            <label>상호/성명 <span class="req">*</span></label>
            <input type="text" id="clientName" placeholder="홍길동 또는 (주)위민기업">
          </div>
          <div class="field">
            <label>연락처 <span class="req">*</span></label>
            <input type="text" id="clientPhone" placeholder="010-0000-0000">
          </div>
          <div class="field">
            <label>이메일 <span style="font-size:11px;color:var(--sub)">(만기 알림 참고용)</span></label>
            <input type="email" id="clientEmail" placeholder="example@email.com">
          </div>
          <div class="field">
            <label>사업자번호 / 생년월일</label>
            <input type="text" id="clientReg" placeholder="000-00-00000">
          </div>
        </div>
      </div>

      <!-- 계약 -->
      <div class="card">
        <div class="card-title">📋 계약 정보</div>
        <div class="grid2">
          <div class="field">
            <label>업무 분야 <span class="req">*</span></label>
            <select id="bizType">
              <option value="">-- 선택 --</option>
              <option value="인허가">인허가</option>
              <option value="인증">인증</option>
              <option value="출입국">출입국</option>
              <option value="조달">조달</option>
              <option value="행정심판">행정심판</option>
              <option value="사실조사">사실조사</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="field">
            <label>세부 업무명</label>
            <input type="text" id="bizDetail" placeholder="예: 건설업 면허 갱신, 비자 연장">
          </div>
          <div class="field">
            <label>계약일 <span class="req">*</span></label>
            <input type="date" id="contractDate">
          </div>
          <div class="field">
            <label>등록 만기일 <span style="font-size:11px;color:#E65100">★ 알림 기준</span></label>
            <input type="date" id="expiryDate">
            <span class="field-hint">D-14, D-7, D-3, D-1, D-0 자동 알림 발송</span>
          </div>
          <div class="field">
            <label>수임료</label>
            <input type="text" id="fee" placeholder="500,000" oninput="formatFee(this)">
          </div>
          <div class="field">
            <label>담당자</label>
            <input type="text" id="manager" placeholder="담당자 이름">
          </div>
        </div>
      </div>

      <!-- 상태 -->
      <div class="card">
        <div class="card-title">🔄 진행 상태</div>
        <div class="status-row">
          <div class="sopt blue">  <input type="radio" name="st" id="s1" value="접수"   checked><label for="s1">접수</label></div>
          <div class="sopt green"> <input type="radio" name="st" id="s2" value="진행중">      <label for="s2">진행중</label></div>
          <div class="sopt orange"><input type="radio" name="st" id="s3" value="완료">        <label for="s3">완료</label></div>
          <div class="sopt gray">  <input type="radio" name="st" id="s4" value="보류">        <label for="s4">보류</label></div>
        </div>
      </div>

      <!-- 메모 -->
      <div class="card">
        <div class="card-title">📝 메모</div>
        <div class="field">
          <textarea id="memo" placeholder="처리 경과, 특이사항, 필요 서류 등 자유롭게 입력"></textarea>
        </div>
      </div>

      <div class="act-row">
        <a href="contracts.html" class="btn-cancel">취소</a>
        <button class="btn-submit" onclick="submitContract()">
          <span id="submitIcon">💾</span><span id="submitText">계약 등록</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 비밀번호 변경 모달 -->
<div class="modal-overlay" id="pwModal">
  <div class="modal-box">
    <div class="modal-title">🔐 비밀번호 변경</div>
    <div class="modal-field"><label>현재 비밀번호</label><input type="password" id="pwCur" placeholder="현재 비밀번호"></div>
    <div class="modal-field"><label>새 비밀번호 (6자 이상)</label><input type="password" id="pwNew" placeholder="새 비밀번호"></div>
    <div class="modal-field"><label>새 비밀번호 확인</label><input type="password" id="pwCfm" placeholder="새 비밀번호 재입력"></div>
    <div class="modal-msg" id="pwMsg"></div>
    <div class="modal-actions">
      <button class="btn-mcancel" onclick="closePwModal()">취소</button>
      <button class="btn-msave" onclick="doChangePw()">변경</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="js/weimin-contracts.js"></script>
<script>
WeiminContracts.requireAuth();
const _editId = new URLSearchParams(location.search).get('edit');

(async () => {
  document.getElementById('contractDate').value = new Date().toISOString().slice(0,10);
  const ok = await WeiminContracts.tryRestoreDir();
  setDriveBanner(ok);
  if (_editId) { const c = WeiminContracts.getById(_editId); if (c) loadEdit(c); }
  if (!ok) setupAutoReconnect();
})();

function setupAutoReconnect() {
  let done = false;
  document.addEventListener('click', async function autoReconnect(e) {
    if (done || e.target.id === 'btnConnect') return;
    done = true;
    document.removeEventListener('click', autoReconnect);
    const ok = await WeiminContracts.requestDirPermission();
    if (ok) { setDriveBanner(true); toast('D드라이브 자동 연결 완료!', 'success'); }
  });
}

function setDriveBanner(ok) {
  const b = document.getElementById('driveBanner'), m = document.getElementById('driveMsg'), btn = document.getElementById('btnConnect');
  if (ok) {
    b.className='drive-banner on'; m.textContent='✅ OneDrive 자동 저장 중';
    btn.className='btn-link do'; btn.textContent='📁 폴더 변경'; btn.onclick=changeDrive;
  } else {
    b.className='drive-banner off'; m.textContent='💾 아무 곳이나 클릭하면 자동 연결됩니다';
    btn.className='btn-link do'; btn.textContent='📁 폴더 연결'; btn.onclick=connectDrive;
  }
}
async function connectDrive() {
  const r = await WeiminContracts.connectFolder();
  if (r.ok) { setDriveBanner(true); toast('폴더 연결 완료!', 'success'); }
  else if (!r.cancelled) toast('연결 실패: ' + (r.error||''), 'error');
}
async function changeDrive() {
  await WeiminContracts.clearFolder();
  const r = await WeiminContracts.connectFolder();
  if (r.ok) { setDriveBanner(true); toast('폴더 변경 완료!', 'success'); }
  else if (!r.cancelled) toast('연결 실패', 'error');
}
function loadEdit(c) {
  document.getElementById('pageMode').textContent  = '수임계약 수정';
  document.getElementById('pageTitle').textContent = '수임계약 수정';
  document.getElementById('pageDesc').textContent  = '계약 정보를 수정합니다';
  document.getElementById('submitText').textContent = '수정 저장';
  ['clientName','clientPhone','clientEmail','clientReg','bizType','bizDetail','contractDate','expiryDate','manager','memo']
    .forEach(k => { const el = document.getElementById(k); if(el) el.value = c[k]||''; });
  document.getElementById('fee').value = c.fee ? (+c.fee).toLocaleString() : '';
  const s = document.querySelector(`input[name="st"][value="${c.status||'접수'}"]`);
  if (s) s.checked = true;
}
function formatFee(el) { const r = el.value.replace(/[^0-9]/g,''); el.value = r ? (+r).toLocaleString() : ''; }
async function submitContract() {
  const clientName = document.getElementById('clientName').value.trim();
  const bizType    = document.getElementById('bizType').value;
  const contractDate = document.getElementById('contractDate').value;
  if (!clientName)   { toast('상호/성명을 입력해주세요', 'error'); return; }
  if (!bizType)      { toast('업무 분야를 선택해주세요', 'error'); return; }
  if (!contractDate) { toast('계약일을 입력해주세요', 'error'); return; }
  const feeRaw = document.getElementById('fee').value.replace(/[^0-9]/g,'');
  const data = {
    clientName, clientPhone: document.getElementById('clientPhone').value.trim(),
    clientEmail: document.getElementById('clientEmail').value.trim(),
    clientReg: document.getElementById('clientReg').value.trim(),
    bizType, bizDetail: document.getElementById('bizDetail').value.trim(),
    contractDate, expiryDate: document.getElementById('expiryDate').value||'',
    fee: feeRaw ? +feeRaw : '', manager: document.getElementById('manager').value.trim(),
    status: document.querySelector('input[name="st"]:checked')?.value || '접수',
    memo: document.getElementById('memo').value.trim(),
  };
  try {
    if (_editId) { await WeiminContracts.update(_editId, data); toast('수정되었습니다!', 'success'); }
    else { await WeiminContracts.add(data); toast('등록되었습니다! 캘린더에 자동 반영됩니다.', 'success'); }
    setTimeout(() => location.href = 'contracts.html', 1200);
  } catch(e) { toast('저장 오류: '+e.message, 'error'); }
}
function openPwModal() { document.getElementById('pwModal').classList.add('show'); }
function closePwModal() { document.getElementById('pwModal').classList.remove('show'); ['pwCur','pwNew','pwCfm'].forEach(id => document.getElementById(id).value=''); }
function doChangePw() {
  const cur = document.getElementById('pwCur').value;
  const nw  = document.getElementById('pwNew').value;
  const cfm = document.getElementById('pwCfm').value;
  const msg = document.getElementById('pwMsg');
  const show = (t,ok) => { msg.textContent=t; msg.className='modal-msg show '+(ok?'ok':'err'); };
  const stored = localStorage.getItem('wms_pw')||'12345';
  if (!cur)       { show('현재 비밀번호를 입력해주세요',false); return; }
  if (cur!==stored){ show('현재 비밀번호가 올바르지 않습니다',false); return; }
  if (nw.length<6){ show('새 비밀번호는 6자 이상이어야 합니다',false); return; }
  if (nw!==cfm)  { show('새 비밀번호가 일치하지 않습니다',false); return; }
  WeiminContracts.changePw(nw);
  show('비밀번호가 변경되었습니다', true);
  setTimeout(closePwModal, 1500);
}
let _tt;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = (type==='success'?'✅ ':type==='error'?'❌ ':'ℹ️ ')+msg;
  el.className = 'show '+type; clearTimeout(_tt);
  _tt = setTimeout(() => { el.className=''; }, 3200);
}
</script>
